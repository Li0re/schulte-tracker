<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulte Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;font-family:'DM Sans',sans-serif;color:#e2e8f0;min-height:100vh;padding-top:72px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0e17}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}

/* ═══ LOGIN SCREEN ═══ */
.login-screen{position:fixed;inset:0;z-index:200;background:#0a0e17;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px;transition:opacity .4s,transform .4s}
.login-screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:14px}
.login-logo .big-grid{width:64px;height:64px;border-radius:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:6px;background:linear-gradient(135deg,#22d3ee,#a78bfa)}
.login-logo .big-grid div{background:rgba(255,255,255,0.85);border-radius:3px}
.login-logo h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:#64748b;font-size:13px}
.google-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:12px;border:1px solid #1e293b;background:#111827;color:#e2e8f0;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.google-btn:hover{background:#1a2332;border-color:#334155}
.google-btn svg{width:20px;height:20px}
.login-error{color:#f87171;font-size:12px;max-width:300px;text-align:center}

/* ═══ SYNC INDICATOR ═══ */
.sync{font-size:10px;padding:3px 8px;border-radius:6px;margin-left:8px;font-weight:600;transition:all .3s}
.sync.saving{background:#facc1520;color:#facc15}
.sync.saved{background:#34d39920;color:#34d399}
.sync.error{background:#f8717120;color:#f87171}
.sync.offline{background:#64748b20;color:#64748b}

/* ═══ USER MENU ═══ */
.user-info{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid #22d3ee40;cursor:pointer}
.user-name{font-size:11px;color:#64748b;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{padding:4px 8px;border-radius:6px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:hover{border-color:#f87171;color:#f87171}

/* ═══ STICKY HEADER ═══ */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#0a0e17ee;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #1e293b40;padding:0 20px;height:68px;display:flex;align-items:center;justify-content:center}
.topbar-inner{max-width:1100px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-grid{width:32px;height:32px;border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:3px;background:linear-gradient(135deg,#22d3ee,#a78bfa)}
.logo-grid div{background:rgba(255,255,255,0.85);border-radius:2px}
.logo h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:10px;color:#64748b}
.hdr-right{display:flex;align-items:center;gap:10px}

/* ═══ ANIMATED TABS ═══ */
.tabs{position:relative;display:flex;background:#111827;border-radius:10px;padding:3px;border:1px solid #1e293b;overflow:hidden}
.tabs .slider{position:absolute;top:3px;bottom:3px;border-radius:8px;background:#22d3ee;transition:left .35s cubic-bezier(.4,0,.2,1),width .35s cubic-bezier(.4,0,.2,1);z-index:0}
.tabs button{position:relative;z-index:1;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:color .25s;background:transparent;color:#64748b;white-space:nowrap}
.tabs button.active{color:#0a0e17}

.app{max-width:1100px;margin:0 auto;padding:12px 20px 40px}
.card{background:#111827;border:1px solid #1e293b;border-radius:14px;padding:20px;margin-bottom:18px}
.card-desc{font-size:12px;color:#64748b;margin:0 0 14px;line-height:1.5;font-style:italic;padding-top:8px;border-top:1px solid #1e293b60}
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{border-radius:14px;padding:16px 18px;flex:1;min-width:130px}
.stat-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1.1px;font-weight:600;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.stat-change{font-size:11px;margin-top:5px}
.chart-box{position:relative;height:260px;margin-top:8px}
.chart-box.sm{height:210px}
.row2{display:flex;gap:14px;flex-wrap:wrap}
.row2>div{flex:1;min-width:260px}
h2{font-size:15px;font-weight:600;margin-bottom:4px}

/* ═══ UNIVERSAL FILTER ═══ */
.ufilter{position:fixed;top:68px;left:0;right:0;z-index:99;display:flex;gap:4px;flex-wrap:wrap;padding:8px 20px;background:#0a0e17ee;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #1e293b40;justify-content:center}
.ufilter-inner{max-width:1100px;width:100%;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ufilter-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-right:8px}
.fbtn{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Space Mono',monospace;transition:all .2s}

.hm-sec{display:flex;gap:16px;flex-wrap:wrap}
.hm-col{flex:1;min-width:180px}
.hm-col h3{font-size:12px;font-weight:600;margin:0 0 8px;font-family:'Space Mono',monospace}
.hm-r{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.hm-d{font-size:9px;color:#64748b;width:38px;text-align:right;font-family:'Space Mono',monospace;flex-shrink:0}
.hm-cs{display:flex;gap:2px;flex:1}
.hm-c{flex:1;height:22px;border-radius:4px;max-width:52px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Space Mono',monospace;cursor:default}
.inp{padding:7px 10px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:14px;font-family:'Space Mono',monospace;outline:none;width:72px;transition:border-color .2s}
.sbtn{padding:11px 28px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#22d3ee,#a78bfa);color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 4px 20px #22d3ee40}
.si{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.si:hover{background:#1a2332}
.si.act{background:#22d3ee12;border-color:#22d3ee30}
.mb{padding:2px 7px;border-radius:5px;font-size:10px;cursor:pointer}
.en{margin-top:10px;padding:7px 10px;background:#34d39918;border-radius:7px;font-size:11px;color:#34d399}
.gs{margin-top:10px;padding:8px 10px;border-radius:7px;font-size:11px;font-family:'Space Mono',monospace;display:flex;justify-content:space-between}
.pm{display:flex;gap:6px;margin-top:10px}
.pm button{flex:1;padding:5px;border-radius:6px;background:transparent;font-size:16px;cursor:pointer;line-height:1}
.cg{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;flex-wrap:wrap;margin-bottom:10px}
.cg input{width:50px;padding:4px 8px;border-radius:6px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:'Space Mono',monospace;outline:none;text-align:center}
@media(max-width:600px){.topbar-inner{flex-direction:column;gap:6px}.topbar{height:auto;padding:10px 16px}body{padding-top:110px}.ufilter{top:auto;position:relative}.hdr-right{flex-wrap:wrap;justify-content:center}}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">
    <div class="big-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
    <h1>Schulte Tracker</h1>
    <p>Suivez votre progression aux tables de Schulte</p>
  </div>
  <button class="google-btn" onclick="googleLogin()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Se connecter avec Google
  </button>
  <div id="login-error" class="login-error"></div>
</div>

<!-- ═══ STICKY HEADER ═══ -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
      <div><h1>Schulte Tracker</h1><p id="hdr-sub"></p></div>
    </div>
    <div class="hdr-right">
      <div class="tabs" id="tab-bar">
        <div class="slider" id="tab-slider"></div>
        <button id="tab-dashboard" onclick="sv('dashboard')">📊 Dashboard</button>
        <button id="tab-entry" onclick="sv('entry')">✏️ Saisie</button>
        <button id="tab-settings" onclick="sv('settings')">⚙️ Config</button>
      </div>
      <span id="sync-badge" class="sync"></span>
      <div class="user-info" id="user-info" style="display:none">
        <img class="user-avatar" id="user-avatar" src="" alt="" title="Mon compte">
        <button class="logout-btn" onclick="doLogout()">Déco</button>
      </div>
    </div>
  </div>
</div>

<div class="app" id="app"></div>

<script>
/* ═══════════════════════════════════════════════
   🔥 FIREBASE CONFIG — REMPLACEZ PAR VOS VALEURS
   ═══════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyCAabOJZRqGorwi9OPc_u9S7dYdcnUVrKQ",
  authDomain:        "schulte-tracker.firebaseapp.com",
  projectId:         "schulte-tracker",
  storageBucket:     "schulte-tracker.firebasestorage.app",
  messagingSenderId: "1009561253017",
  appId:             "1:1009561253017:web:157ba5290381f47602b408"
};
/* ═══════════════════════════════════════════════ */

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
// Offline persistence for when you have no connection
db.enablePersistence().catch(()=>{});

let currentUser = null;
let userDocRef = null;

/* ═══ AUTH ═══ */
function googleLogin() {
  document.getElementById("login-error").textContent = "";
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById("login-error").textContent = "Erreur : " + err.message;
  });
}

function doLogout() {
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  const loginEl = document.getElementById("login-screen");
  const userEl = document.getElementById("user-info");
  if (user) {
    currentUser = user;
    userDocRef = db.collection("users").doc(user.uid);
    document.getElementById("user-avatar").src = user.photoURL || "";
    document.getElementById("user-avatar").title = user.displayName || user.email;
    userEl.style.display = "flex";
    loginEl.classList.add("hidden");
    await loadFromFirestore();
    R();
  } else {
    currentUser = null;
    userDocRef = null;
    userEl.style.display = "none";
    loginEl.classList.remove("hidden");
  }
});

/* ═══ SYNC ═══ */
function showSync(status, text) {
  const el = document.getElementById("sync-badge");
  el.className = "sync " + status;
  el.textContent = text;
  if (status === "saved") setTimeout(() => { el.textContent = ""; el.className = "sync"; }, 2500);
}

let saveTimeout = null;
async function saveToFirestore() {
  if (!userDocRef) return;
  showSync("saving", "⏳");
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      await userDocRef.set({ data: S.data, grids: S.grids, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      showSync("saved", "☁️ ✓");
    } catch (e) {
      console.error("Save error:", e);
      showSync("error", "✗ Erreur");
    }
  }, 600); // debounce 600ms
}

async function loadFromFirestore() {
  if (!userDocRef) return;
  try {
    const doc = await userDocRef.get();
    if (doc.exists) {
      const d = doc.data();
      S.data = d.data || ID;
      S.grids = d.grids || DG;
    } else {
      // First time: seed with initial data
      S.data = JSON.parse(JSON.stringify(ID));
      S.grids = JSON.parse(JSON.stringify(DG));
      await saveToFirestore();
    }
    lev();
  } catch (e) {
    console.error("Load error:", e);
    showSync("error", "✗ Chargement");
  }
}

/* ═══ DATA ═══ */
const GC=["#22d3ee","#a78bfa","#fb923c","#f472b6","#4ade80","#facc15","#38bdf8","#c084fc"];
const DG=[{key:"3x3",label:"3×3",defaultAttempts:5,color:GC[0]},{key:"4x4",label:"4×4",defaultAttempts:5,color:GC[1]},{key:"5x5",label:"5×5",defaultAttempts:3,color:GC[2]}];
const ID=[
{date:"2026-02-02","3x3":[3.69,2.65,5.47,3.97,4.91],"4x4":[14.62,14.38,9.63,11.7,16.24],"5x5":[52.32,52.91,53.21]},
{date:"2026-02-03","3x3":[4.38,7.21,4.45,3.23,4.2],"4x4":[14.94,12.94,16.16,13.55,10.19],"5x5":[52.14,46.06]},
{date:"2026-02-04","3x3":[4.96,2.68,2.74,3.48,3.36],"4x4":[13.44,16.47,17.75,8.55,16.83],"5x5":[39.96,39.48,52.14]},
{date:"2026-02-05","3x3":[3.19,2.74,3.8,2.48,4.51],"4x4":[8.26,18.83,14.16,9.29,9.39],"5x5":[39.97,61.27,24.31]},
{date:"2026-02-06","3x3":[3.74,3.65,2.91,3.47,3.75],"4x4":[15.64,11.31,13.17,9.06,12.92],"5x5":[47.51,36.96,30.34]},
{date:"2026-02-07","3x3":[2.68,2.19,3,3.23,2.87],"4x4":[12.16,10.71,13.87,8.53,9.88],"5x5":[26.86,31.28,34.07]},
{date:"2026-02-08","3x3":[2.97,4,2.99,3.03,2.83],"4x4":[11.87,10.13,9.47,8.96,9.1],"5x5":[47.37,32.59,33.88]},
{date:"2026-02-09","3x3":[3.45,2.4,2.43,3.59,2.86],"4x4":[8.21,6.38,7.24,8.43],"5x5":[27.94,38.64,23.45]}
];

const av=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const bt=a=>a.length?Math.min(...a):0;
const sd=a=>{if(a.length<2)return 0;const m=av(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)};
const fd=i=>new Date(i+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
const ti=()=>new Date().toISOString().slice(0,10);

let S={data:ID,grids:DG,view:"dashboard",ed:ti(),ev:{},sf:"all",cd:null,cdg:null,cr:false,sag:false,ngs:"",nga:"3"};
function ps(){ saveToFirestore(); }
function lev(){const ex=S.data.find(d=>d.date===S.ed);const e={};S.grids.forEach(g=>{const v=ex?.[g.key]||[];const c=Math.max(v.length,g.defaultAttempts);e[g.key]=[...v.map(String),...Array(Math.max(0,c-v.length)).fill("")]});S.ev=e}
lev();

let CH={};function dC(){Object.values(CH).forEach(c=>c.destroy());CH={}}
const CO={responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{labels:{color:'#64748b',font:{size:11,family:"'Space Mono'"}}},tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,cornerRadius:10,padding:10}},scales:{x:{ticks:{color:'#64748b',font:{size:10,family:"'Space Mono'"}},grid:{color:'#1e293b33'}},y:{ticks:{color:'#64748b',font:{size:10,family:"'Space Mono'"}},grid:{color:'#1e293b'}}}};

/* ═══ TAB SLIDER ═══ */
function updateSlider(){
  const bar=document.getElementById("tab-bar"),active=document.getElementById("tab-"+S.view),slider=document.getElementById("tab-slider");
  if(!bar||!active||!slider)return;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  active.classList.add("active");
  const br=bar.getBoundingClientRect(),ar=active.getBoundingClientRect();
  slider.style.left=(ar.left-br.left)+"px";slider.style.width=ar.width+"px";
}
function fg(){return S.sf==="all"?S.grids:S.grids.filter(g=>g.key===S.sf)}

/* ═══ RENDER ═══ */
function R(){
  if(!currentUser)return;
  dC();const d=S.data,g=S.grids;
  const ta=g.reduce((s,gr)=>s+d.reduce((s2,x)=>s2+(x[gr.key]?.length||0),0),0);
  document.getElementById("hdr-sub").textContent=`${d.length} jours · ${ta} essais · ${g.length} grilles`;
  const app=document.getElementById("app");
  let h="";
  if(S.view==="dashboard")h=rD();else if(S.view==="entry")h=rE();else h=rS();
  app.innerHTML=h;
  requestAnimationFrame(()=>{updateSlider();if(S.view==="dashboard")iC()});
}

/* ═══ DASHBOARD ═══ */
function rD(){
  const g=fg(),d=S.data;
  if(!d.length)return'<div style="text-align:center;padding:60px;color:#64748b"><p>📭 Aucune donnée.</p><button class="sbtn" onclick="sv(\'entry\')" style="margin-top:12px">Commencer →</button></div>';
  const L=d[d.length-1],F=d[0];
  let uf=`<div class="ufilter"><div class="ufilter-inner"><span class="ufilter-label">🔍 Filtre :</span>`;
  uf+=`<button class="fbtn" onclick="sfl('all')" style="background:${S.sf==='all'?'#22d3ee':'#1e293b'};color:${S.sf==='all'?'#0a0e17':'#64748b'}">Toutes</button>`;
  S.grids.forEach(gr=>{uf+=`<button class="fbtn" onclick="sfl('${gr.key}')" style="background:${S.sf===gr.key?gr.color:'#1e293b'};color:${S.sf===gr.key?'#0a0e17':'#64748b'}">${gr.label}</button>`});
  uf+='</div></div><div style="height:44px"></div>';
  let h=uf+'<div class="stat-row">';
  g.forEach(gr=>{const v=L[gr.key]||[],fv=F[gr.key]||[];const a=v.length?av(v):null,fa=fv.length?av(fv):null;const c=(a&&fa)?((a-fa)/fa*100):null;
  h+=`<div class="stat" style="background:linear-gradient(135deg,${gr.color}10,${gr.color}05);border:1px solid ${gr.color}30"><div class="stat-label">◧ ${gr.label} Moy.</div><div class="stat-value" style="color:${gr.color}">${a?a.toFixed(2):"—"}<span style="font-size:13px;color:#64748b;margin-left:3px">${a?"s":""}</span></div>${c!=null?`<div class="stat-change" style="color:${c<=0?"#34d399":"#f87171"}">${c<=0?"▼":"▲"} ${Math.abs(c).toFixed(1)}% vs jour 1</div>`:""}</div>`});
  h+='</div><div class="stat-row">';
  g.forEach(gr=>{const av2=d.flatMap(x=>x[gr.key]||[]);const b=av2.length?Math.min(...av2):null;
  h+=`<div class="stat" style="background:linear-gradient(135deg,${gr.color}10,${gr.color}05);border:1px solid ${gr.color}30"><div class="stat-label">⚡ Record ${gr.label}</div><div class="stat-value" style="color:${gr.color}">${b?b.toFixed(2):"—"}<span style="font-size:13px;color:#64748b;margin-left:3px">${b?"s":""}</span></div></div>`});
  h+='</div>';
  h+=`<div class="card"><h2>📉 Moyennes par session</h2><p class="card-desc">Évolution de votre temps moyen sur l'ensemble des essais de chaque session. Une courbe qui descend = vous progressez.</p><div class="chart-box"><canvas id="cA"></canvas></div></div>`;
  h+=`<div class="card"><h2>⚡ Meilleurs temps</h2><p class="card-desc">Votre meilleur essai de chaque jour. Reflète votre pic de performance — un bon indicateur de votre potentiel réel.</p><div class="chart-box"><canvas id="cB"></canvas></div></div>`;
  h+=`<div class="row2"><div class="card"><h2>📊 Progression (%)</h2><p class="card-desc">Variation de votre moyenne par rapport au tout premier jour. Négatif = amélioration (vous êtes plus rapide qu'au début).</p><div class="chart-box sm"><canvas id="cP"></canvas></div></div>`;
  h+=`<div class="card"><h2>🎯 Régularité (écart-type)</h2><p class="card-desc">Mesure la dispersion de vos temps dans une même session. Plus c'est bas, plus vos performances sont constantes et fiables.</p><div class="chart-box sm"><canvas id="cC"></canvas></div></div></div>`;
  let hm='<div class="hm-sec">';
  g.forEach(gr=>{const av2=d.flatMap(x=>x[gr.key]||[]);if(!av2.length)return;const mn=Math.min(...av2),mx=Math.max(...av2);
  hm+=`<div class="hm-col"><h3 style="color:${gr.color}">${gr.label}</h3>`;
  d.forEach(x=>{const v=x[gr.key]||[];if(!v.length){hm+=`<div class="hm-r"><span class="hm-d" style="color:#475569">${fd(x.date)}</span><span style="font-size:9px;color:#475569;font-style:italic">—</span></div>`;return;}
  hm+=`<div class="hm-r"><span class="hm-d">${fd(x.date)}</span><div class="hm-cs">`;
  v.forEach(val=>{const it=mx>mn?1-(val-mn)/(mx-mn):0.5;const al=Math.round(20+it*60).toString(16).padStart(2,"0");const ib=val===mn;
  hm+=`<div class="hm-c" title="${val.toFixed(2)}s" style="background:${gr.color}${al};border:${ib?`2px solid ${gr.color}`:'1px solid transparent'};font-weight:${ib?700:400};color:${it>0.6?'#e2e8f0':'#64748b'}">${val.toFixed(1)}</div>`});
  hm+='</div></div>'});
  hm+=`<p style="font-size:9px;color:#64748b;margin-top:6px;text-align:center">Record : <span style="color:${gr.color};font-weight:700">${mn.toFixed(2)}s</span></p></div>`});
  hm+='</div>';
  h+=`<div class="card"><h2>🔬 Tous les essais</h2><p class="card-desc">Carte thermique de chaque essai. Plus la case est vive, meilleur est le temps. Le record absolu est encadré.</p>${hm}</div>`;
  h+=`<div style="text-align:center;padding:14px 0 0;color:#64748b;font-size:11px">Dernière session : ${fd(d[d.length-1].date)} · <span style="color:#34d399;font-weight:600">En progression 🚀</span></div>`;
  return h;
}

function iC(){
  const g=fg(),d=S.data;if(!d.length)return;const lb=d.map(x=>fd(x.date));
  const e1=document.getElementById("cA");
  if(e1){CH.a=new Chart(e1,{type:'line',data:{labels:lb,datasets:g.map(gr=>({label:gr.label+" moy",data:d.map(x=>(x[gr.key]?.length)?+av(x[gr.key]).toFixed(2):0),borderColor:gr.color,backgroundColor:gr.color+"30",fill:true,tension:.3,pointRadius:4,pointBackgroundColor:gr.color,borderWidth:2.5}))},options:JSON.parse(JSON.stringify(CO))})}
  const e2=document.getElementById("cB");
  if(e2){CH.b=new Chart(e2,{type:'line',data:{labels:lb,datasets:g.map(gr=>({label:gr.label+" best",data:d.map(x=>(x[gr.key]?.length)?+bt(x[gr.key]).toFixed(2):0),borderColor:gr.color,backgroundColor:gr.color,borderDash:[6,3],tension:.3,pointRadius:4,pointBackgroundColor:gr.color,borderWidth:2,fill:false}))},options:JSON.parse(JSON.stringify(CO))})}
  const e3=document.getElementById("cP");
  if(e3&&d.length>=2){const fa={};g.forEach(gr=>{const v=d[0][gr.key];fa[gr.key]=v?.length?av(v):0});
  CH.p=new Chart(e3,{type:'bar',data:{labels:lb,datasets:g.map(gr=>({label:gr.label,data:d.map(x=>{const v=x[gr.key];const a=v?.length?av(v):0;return(fa[gr.key]>0&&a>0)?+((a-fa[gr.key])/fa[gr.key]*100).toFixed(1):0}),backgroundColor:gr.color+"cc",borderRadius:4,maxBarThickness:16}))},options:{...JSON.parse(JSON.stringify(CO)),scales:{...CO.scales,y:{...CO.scales.y,ticks:{color:'#64748b',font:{size:10,family:"'Space Mono'"},callback:v=>v+"%"}}}}})}
  const e4=document.getElementById("cC");
  if(e4){CH.c=new Chart(e4,{type:'line',data:{labels:lb,datasets:g.map(gr=>({label:gr.label,data:d.map(x=>{const v=x[gr.key];return v?.length>=2?+sd(v).toFixed(2):0}),borderColor:gr.color,backgroundColor:gr.color,tension:.3,pointRadius:4,pointBackgroundColor:gr.color,borderWidth:2,fill:false}))},options:JSON.parse(JSON.stringify(CO))})}
}

/* ═══ ENTRY ═══ */
function rE(){
  const g=S.grids,d=S.data,ex=d.find(x=>x.date===S.ed);
  let gc='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px">';
  g.forEach(gr=>{const f=S.ev[gr.key]||Array(gr.defaultAttempts).fill("");const fi=f.map(v=>parseFloat(String(v).replace(",","."))).filter(v=>!isNaN(v)&&v>0);
  gc+=`<div class="card" style="flex:1;min-width:185px"><h3 style="font-size:15px;font-weight:700;color:${gr.color};margin:0 0 14px;font-family:'Space Mono',monospace">${gr.label}</h3><div>`;
  f.forEach((v,i)=>{gc+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:11px;color:#64748b;font-family:'Space Mono',monospace;width:20px;text-align:right">#${i+1}</span><input class="inp" type="text" inputmode="decimal" placeholder="—" value="${v}" oninput="ue('${gr.key}',${i},this.value)" onkeydown="if(event.key==='Enter')se()" style="border-color:${v?gr.color+'60':'#1e293b'};background:${v?gr.color+'10':'#0f172a'}"><span style="font-size:11px;color:#64748b">s</span></div>`});
  gc+=`</div><div class="pm"><button onclick="aa('${gr.key}')" style="border:1px dashed ${gr.color}40;color:${gr.color}">+</button><button onclick="ra('${gr.key}')" style="border:1px dashed ${f.length<=1?'#1e293b':gr.color+'40'};color:${f.length<=1?'#475569':gr.color};opacity:${f.length<=1?.4:1};cursor:${f.length<=1?'not-allowed':'pointer'}">−</button></div>`;
  if(fi.length>0)gc+=`<div class="gs" style="background:${gr.color}10;color:${gr.color}"><span>Moy: ${av(fi).toFixed(2)}s</span><span>Best: ${bt(fi).toFixed(2)}s</span></div>`;
  gc+='</div>'});gc+='</div>';
  let sl='';[...d].reverse().forEach(x=>{const ia=x.date===S.ed;const gi=g.map(gr=>{const v=x[gr.key]||[];return v.length?`<span style="color:${gr.color}">${gr.label}:${v.length}</span>`:''}).filter(Boolean).join(' ');
  sl+=`<div class="si ${ia?'act':''}" onclick="sed('${x.date}')"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font-size:12px;font-weight:600;font-family:'Space Mono',monospace;color:${ia?'#22d3ee':'#e2e8f0'};min-width:55px">${fd(x.date)}</span><div style="display:flex;gap:8px;font-size:11px">${gi}</div></div>${S.cd===x.date?`<div style="display:flex;gap:3px" onclick="event.stopPropagation()"><button class="mb" onclick="de('${x.date}')" style="border:none;background:#f87171;color:#fff;font-weight:600">Oui</button><button class="mb" onclick="S.cd=null;R()" style="border:1px solid #1e293b;background:transparent;color:#64748b">Non</button></div>`:`<button class="mb" onclick="event.stopPropagation();S.cd='${x.date}';R()" style="border:1px solid #1e293b;background:transparent;color:#64748b">🗑</button>`}</div>`});
  return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><label style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;font-weight:600">Date de la session</label><div style="margin-top:5px"><input type="date" value="${S.ed}" onchange="sed(this.value)" style="padding:7px 12px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:'Space Mono',monospace;outline:none"></div></div><div style="display:flex;gap:5px;flex-wrap:wrap"><button onclick="shd(-1)" style="padding:5px 10px;border-radius:7px;border:1px solid #1e293b;background:#111827;color:#64748b;font-size:11px;cursor:pointer">← Veille</button><button onclick="sed('${ti()}')" style="padding:5px 10px;border-radius:7px;border:1px solid #22d3ee30;background:#22d3ee15;color:#22d3ee;font-size:11px;cursor:pointer;font-weight:600">Aujourd'hui</button><button onclick="shd(1)" style="padding:5px 10px;border-radius:7px;border:1px solid #1e293b;background:#111827;color:#64748b;font-size:11px;cursor:pointer">Lendemain →</button></div></div>${ex?'<div class="en">✓ Données existantes — modifiez et sauvegardez pour mettre à jour</div>':''}</div>${gc}<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px"><button class="sbtn" onclick="se()">💾 Sauvegarder</button><span id="ss" style="font-size:12px;font-weight:600"></span></div><div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">📋 Sessions enregistrées</h3><p class="card-desc" style="margin-top:0">Cliquez sur une session pour la modifier. L'icône 🗑 permet de la supprimer.</p>${d.length===0?'<p style="color:#64748b;font-size:12px">Aucune donnée.</p>':`<div style="display:flex;flex-direction:column;gap:4px">${sl}</div>`}</div>`;
}

/* ═══ SETTINGS ═══ */
function rS(){
  const g=S.grids;let gl='';
  g.forEach(gr=>{gl+=`<div class="cg" style="background:${gr.color}08;border:1px solid ${gr.color}25"><span style="font-size:16px;font-weight:700;color:${gr.color};font-family:'Space Mono',monospace;min-width:50px">${gr.label}</span><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b"><span>Essais par défaut :</span><input type="number" min="1" max="20" value="${gr.defaultAttempts}" onchange="ua('${gr.key}',this.value)"></div><div style="margin-left:auto">${S.cdg===gr.key?`<div style="display:flex;gap:4px"><span style="font-size:11px;color:#64748b;align-self:center;margin-right:4px">Sûr ?</span><button onclick="rg('${gr.key}')" style="padding:4px 10px;border-radius:6px;border:none;background:#f87171;color:#fff;font-size:11px;cursor:pointer;font-weight:600">Oui</button><button onclick="S.cdg=null;R()" style="padding:4px 10px;border-radius:6px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:11px;cursor:pointer">Non</button></div>`:`<button onclick="S.cdg='${gr.key}';R()" style="padding:4px 10px;border-radius:6px;border:1px solid #f8717130;background:#f8717118;color:#f87171;font-size:11px;cursor:pointer;font-weight:600">Supprimer</button>`}</div></div>`});
  const af=S.sag?`<div style="margin-top:14px;padding:16px;border-radius:10px;border:1px solid #22d3ee30;background:#22d3ee08"><div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap"><div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Taille (n)</label><input type="number" min="2" max="12" placeholder="6" value="${S.ngs}" oninput="S.ngs=this.value" style="width:60px;padding:8px 10px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:14px;font-family:'Space Mono',monospace;outline:none;text-align:center"><span style="font-size:12px;color:#64748b;margin-left:6px">→ ${S.ngs&&!isNaN(parseInt(S.ngs))?S.ngs+'×'+S.ngs:'n×n'}</span></div><div><label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Essais / jour</label><input type="number" min="1" max="20" value="${S.nga}" oninput="S.nga=this.value" style="width:60px;padding:8px 10px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:14px;font-family:'Space Mono',monospace;outline:none;text-align:center"></div><button onclick="ag()" style="padding:8px 20px;border-radius:8px;border:none;background:#22d3ee;color:#0a0e17;font-size:13px;font-weight:700;cursor:pointer">Ajouter</button><button onclick="S.sag=false;R()" style="padding:8px 14px;border-radius:8px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:13px;cursor:pointer">Annuler</button></div></div>`:`<button onclick="S.sag=true;R()" style="margin-top:14px;padding:10px 20px;border-radius:9px;border:1px dashed #1e293b;background:transparent;color:#64748b;font-size:13px;cursor:pointer;width:100%">+ Ajouter une grille</button>`;
  const rb=S.cr?`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:12px;color:#f87171">Toutes les modifications seront perdues. Sûr ?</span><button onclick="ra2()" style="padding:6px 14px;border-radius:7px;border:none;background:#f87171;color:#fff;font-size:12px;cursor:pointer;font-weight:600">Oui</button><button onclick="S.cr=false;R()" style="padding:6px 14px;border-radius:7px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:12px;cursor:pointer">Annuler</button></div>`:`<button onclick="S.cr=true;R()" style="padding:8px 18px;border-radius:8px;border:1px solid #f8717130;background:#f8717118;color:#f87171;font-size:12px;cursor:pointer;font-weight:600">↺ Réinitialiser</button>`;
  return `<div class="card"><h2>🎛 Grilles configurées</h2><p class="card-desc">Gérez vos tailles de grille et le nombre d'essais par défaut pour chacune.</p>${gl}${af}</div><div class="card"><h2>🔧 Données</h2><p class="card-desc">Réinitialise toutes vos données et grilles vers les valeurs d'origine (8 sessions du 2 au 9 février).</p>${rb}</div>`;
}

/* ═══ ACTIONS ═══ */
function sv(v){S.view=v;if(v==='entry')lev();R()}
function sfl(f){S.sf=f;R()}
function sed(d){S.ed=d;lev();R()}
function shd(n){const d=new Date(S.ed+"T12:00:00");d.setDate(d.getDate()+n);sed(d.toISOString().slice(0,10))}
function ue(gk,i,v){if(!S.ev[gk])S.ev[gk]=[];S.ev[gk][i]=v}
function aa(gk){if(!S.ev[gk])S.ev[gk]=[];S.ev[gk].push("");R()}
function ra(gk){if(!S.ev[gk]||S.ev[gk].length<=1)return;S.ev[gk].pop();R()}
function se(){const ne={date:S.ed};let ha=false;S.grids.forEach(g=>{const v=(S.ev[g.key]||[]).map(x=>parseFloat(String(x).replace(",","."))).filter(x=>!isNaN(x)&&x>0);ne[g.key]=v;if(v.length)ha=true});if(!ha)return;S.data=S.data.filter(d=>d.date!==S.ed);S.data.push(ne);S.data.sort((a,b)=>a.date.localeCompare(b.date));ps();R();const el=document.getElementById("ss");if(el){el.textContent="✓ Sauvegardé !";el.style.color="#34d399";setTimeout(()=>{if(el)el.textContent=""},2000)}}
function de(d){S.data=S.data.filter(x=>x.date!==d);ps();S.cd=null;lev();R()}
function rg(k){S.grids=S.grids.filter(g=>g.key!==k);S.data=S.data.map(d=>{const n={...d};delete n[k];return n});ps();S.cdg=null;if(S.sf===k)S.sf="all";R()}
function ua(k,v){const n=parseInt(v);if(isNaN(n)||n<1||n>20)return;S.grids=S.grids.map(g=>g.key===k?{...g,defaultAttempts:n}:g);ps()}
function ag(){const s=parseInt(S.ngs);if(isNaN(s)||s<2||s>12)return;const k=`${s}x${s}`;if(S.grids.some(g=>g.key===k))return;S.grids.push({key:k,label:`${s}×${s}`,defaultAttempts:parseInt(S.nga)||3,color:GC[S.grids.length%GC.length]});S.data=S.data.map(d=>({...d,[k]:d[k]||[]}));ps();S.ngs="";S.nga="3";S.sag=false;R()}
function ra2(){S.data=JSON.parse(JSON.stringify(ID));S.grids=JSON.parse(JSON.stringify(DG));ps();S.cr=false;S.sf="all";lev();R()}
</script>
