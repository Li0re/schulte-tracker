<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulte Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#0f172a;--bg-hover:#1a2332;
  --border:#1e293b;--border2:#334155;--border-light:#1e293b40;
  --text:#e2e8f0;--text2:#64748b;--text3:#475569;--text4:#94a3b8;
  --card:#111827;--card-desc:#1e293b60;
  --scrollbar-track:#0a0e17;--scrollbar-thumb:#1e293b;
  --grid-line:#1e293b;--grid-line-light:#1e293b33;
  --chart-tooltip-bg:#1e293b;--chart-tooltip-text:#e2e8f0;--chart-tooltip-border:#334155;
}
body.light{
  --bg:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--bg-hover:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;--border-light:#cbd5e140;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;--text4:#94a3b8;
  --card:#ffffff;--card-desc:#e2e8f060;
  --scrollbar-track:#f1f5f9;--scrollbar-thumb:#cbd5e1;
  --grid-line:#e2e8f0;--grid-line-light:#e2e8f066;
  --chart-tooltip-bg:#ffffff;--chart-tooltip-text:#1e293b;--chart-tooltip-border:#e2e8f0;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;padding-top:72px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--scrollbar-track)}::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}

/* ═══ LOGIN SCREEN ═══ */
.login-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px;transition:opacity .4s,transform .4s}
.login-screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:14px}
.login-logo .big-grid{width:64px;height:64px;border-radius:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:6px;background:linear-gradient(135deg,#22d3ee,#a78bfa)}
.login-logo .big-grid div{background:rgba(255,255,255,0.85);border-radius:3px}
.login-logo h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--text2);font-size:13px}
.google-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.google-btn:hover{background:var(--bg-hover);border-color:var(--border2)}
.google-btn svg{width:20px;height:20px}
.login-error{color:#f87171;font-size:12px;max-width:300px;text-align:center}

/* ═══ SYNC INDICATOR ═══ */
.sync{font-size:10px;padding:3px 8px;border-radius:6px;margin-left:8px;font-weight:600;transition:all .3s}
.sync.saving{background:#facc1520;color:#facc15}
.sync.saved{background:#34d39920;color:#34d399}
.sync.error{background:#f8717120;color:#f87171}
.sync.offline{background:#64748b20;color:var(--text2)}

/* ═══ USER MENU ═══ */
.user-info{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid #22d3ee40;cursor:pointer}
.user-name{font-size:11px;color:var(--text2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:hover{border-color:#f87171;color:#f87171}

/* ═══ STICKY HEADER ═══ */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:color-mix(in srgb,var(--bg) 93%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-light);padding:0 20px;height:68px;display:flex;align-items:center;justify-content:center}
.topbar-inner{max-width:1100px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-grid{width:32px;height:32px;border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:3px;background:linear-gradient(135deg,#22d3ee,#a78bfa)}
.logo-grid div{background:rgba(255,255,255,0.85);border-radius:2px}
.logo h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a78bfa,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:10px;color:var(--text2)}
.hdr-right{display:flex;align-items:center;gap:10px}

/* ═══ ANIMATED TABS ═══ */
.tabs{position:relative;display:flex;background:var(--bg2);border-radius:10px;padding:3px;border:1px solid var(--border);overflow:hidden}
.tabs .slider{position:absolute;top:3px;bottom:3px;border-radius:8px;background:#22d3ee;transition:left .35s cubic-bezier(.4,0,.2,1),width .35s cubic-bezier(.4,0,.2,1);z-index:0}
.tabs button{position:relative;z-index:1;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:color .25s;background:transparent;color:var(--text2);white-space:nowrap}
.tabs button.active{color:#0a0e17}

.app{max-width:1100px;margin:0 auto;padding:12px 20px 40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px}
.card-desc{font-size:12px;color:var(--text2);margin:0 0 14px;line-height:1.5;font-style:italic;padding-top:8px;border-top:1px solid var(--card-desc)}
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{border-radius:14px;padding:16px 18px;flex:1;min-width:130px}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1.1px;font-weight:600;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.stat-change{font-size:11px;margin-top:5px}
.chart-box{position:relative;height:290px;margin-top:8px}
.chart-box.sm{height:240px}
.row2{display:flex;gap:14px;flex-wrap:wrap}
.row2>div{flex:1;min-width:260px}
h2{font-size:15px;font-weight:600;margin-bottom:4px}

/* ═══ UNIVERSAL FILTER ═══ */
.ufilter{position:fixed;top:68px;left:0;right:0;z-index:99;display:flex;gap:4px;flex-wrap:wrap;padding:8px 20px;background:color-mix(in srgb,var(--bg) 93%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-light);justify-content:center}
.ufilter-inner{max-width:1100px;width:100%;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ufilter-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-right:8px}
.fbtn{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Space Mono',monospace;transition:all .2s}

.hm-sec{display:flex;gap:16px;flex-wrap:wrap}
.hm-col{flex:1;min-width:180px}
.hm-col h3{font-size:12px;font-weight:600;margin:0 0 8px;font-family:'Space Mono',monospace}
.hm-r{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.hm-d{font-size:9px;color:var(--text2);width:38px;text-align:right;font-family:'Space Mono',monospace;flex-shrink:0}
.hm-cs{display:flex;gap:2px;flex:1}
.hm-c{flex:1;height:22px;border-radius:4px;max-width:52px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Space Mono',monospace;cursor:default}
.inp{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:'Space Mono',monospace;outline:none;width:72px;transition:border-color .2s}
.sbtn{padding:11px 28px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#22d3ee,#a78bfa);color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 4px 20px #22d3ee40}
.si{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.si:hover{background:var(--bg-hover)}
.si.act{background:#22d3ee12;border-color:#22d3ee30}
.mb{padding:2px 7px;border-radius:5px;font-size:10px;cursor:pointer}
.en{margin-top:10px;padding:7px 10px;background:#34d39918;border-radius:7px;font-size:11px;color:#34d399}
.gs{margin-top:10px;padding:8px 10px;border-radius:7px;font-size:11px;font-family:'Space Mono',monospace;display:flex;justify-content:space-between}
.pm{display:flex;gap:6px;margin-top:10px}
.pm button{flex:1;padding:5px;border-radius:6px;background:transparent;font-size:16px;cursor:pointer;line-height:1}
.cg{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;flex-wrap:wrap;margin-bottom:10px}
.cg input{width:50px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:'Space Mono',monospace;outline:none;text-align:center}
@media(max-width:600px){.topbar-inner{flex-direction:column;gap:6px}.topbar{height:auto;padding:10px 16px}body{padding-top:110px}.ufilter{top:auto;position:relative}.hdr-right{flex-wrap:wrap;justify-content:center}}

/* ═══ THEME ═══ */
/* Light overrides — most styles now use CSS variables automatically */
body.light .si.act{background:#22d3ee08;border-color:#22d3ee20}
body.light h2{color:#1e293b}
body.light .cal-popup{box-shadow:0 12px 40px #00000012}
body.light ::-webkit-scrollbar-track{background:#f1f5f9}
body.light ::-webkit-scrollbar-thumb{background:#cbd5e1}
body.light .game-cell{background:#ffffff;border-color:#cbd5e1}
body.light .game-cell:active{background:#e2e8f0}
.theme-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:4px 8px;cursor:pointer;font-size:14px;line-height:1;transition:all .15s}

/* ═══ VIEW TRANSITIONS ═══ */
.view-transition{animation:viewIn .25s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ═══ STREAK ═══ */
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
.streak-badge.hot{background:#f9731618;color:#f97316;border:1px solid #f9731630}
.streak-badge.cold{background:#64748b18;color:var(--text2);border:1px solid #64748b30}

/* ═══ OBJECTIVES ═══ */
.obj-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:8px;flex-wrap:wrap}
.obj-bar{flex:1;min-width:80px;height:8px;border-radius:4px;background:var(--border);overflow:hidden}
.obj-fill{height:100%;border-radius:4px;transition:width .4s ease}
.obj-input{width:55px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;font-family:'Space Mono',monospace;outline:none;text-align:center}

/* ═══ EXPORT ═══ */
.export-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.export-btn:hover{border-color:var(--border2);color:var(--text)}

/* ═══ DATE RANGE PICKER ═══ */
.dr-wrap{position:relative;margin-left:auto}
.dr-btn{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Space Mono',monospace;transition:all .2s;display:flex;align-items:center;gap:6px}
.dr-btn:hover{border-color:var(--border2)}
.dr-btn .ico{font-size:13px}
.cal-popup{position:absolute;top:100%;right:0;margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;width:280px;z-index:200;box-shadow:0 12px 40px #00000020}
.cal-presets{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.cal-presets button{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.cal-presets button.act{background:#22d3ee;color:#0a0e17;border-color:#22d3ee}
.cal-presets button:hover:not(.act){border-color:var(--border2);color:var(--text)}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-hdr span{font-size:13px;font-weight:600;color:var(--text);text-transform:capitalize}
.cal-hdr button{background:none;border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-hdr button:hover{border-color:var(--border2);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dn{font-size:9px;color:var(--text3);font-weight:600;padding:4px 0;text-transform:uppercase}
.cal-day{font-size:11px;padding:6px 2px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .1s;position:relative}
.cal-day:hover:not(.empty){background:var(--bg-hover);color:var(--text)}
.cal-day.empty{cursor:default}
.cal-day.today{color:#22d3ee;font-weight:700}
.cal-day.sel{background:#22d3ee;color:#0a0e17;font-weight:700;border-radius:6px}
.cal-day.inrange{background:#22d3ee20;color:#22d3ee}
.cal-day.has-data::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#22d3ee60}
.cal-day.sel::after,.cal-day.inrange::after{display:none}

/* ═══ GAME ═══ */
.game-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.game-grid-sel{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.game-grid-sel button{padding:6px 12px;border-radius:9px;border:2px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s}
.game-grid-sel button.active{border-color:var(--gc);color:var(--gc);background:color-mix(in srgb,var(--gc) 10%,var(--bg2))}
.game-board{display:grid;user-select:none;-webkit-user-select:none;max-width:min(90vw,520px);width:100%;margin:0 auto}
.game-cell{display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;border:1px solid var(--border2);background:var(--bg-hover);color:var(--text);touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:none}
.game-cell:active{background:var(--bg3)}
.game-cell.wrong{background:#f8717130;animation:shake .25s ease}
.game-cell.done{cursor:default}
.game-cell.idle{cursor:pointer}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.game-board-wrap{transition:opacity .2s ease,transform .2s ease}
.game-board-wrap.switching{opacity:0;transform:scale(.95)}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300}
.badge-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid #facc15;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#facc15;box-shadow:0 8px 32px #00000040;z-index:250;animation:badgeIn .4s ease,badgeOut .4s ease 2.6s forwards}
@keyframes badgeIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes badgeOut{to{opacity:0;transform:translateX(-50%) translateY(20px)}}
.badges-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.badge-item{padding:8px 14px;border-radius:10px;font-size:11px;font-family:'Space Mono',monospace;font-weight:600;display:flex;align-items:center;gap:6px}
.badge-item.earned{background:#facc1515;border:1px solid #facc1530;color:#facc15}
.badge-item.locked{background:var(--bg3);border:1px solid var(--border);color:var(--text3);opacity:.5}
.game-result{text-align:center;padding:28px;background:var(--card);border:1px solid var(--border);border-radius:18px;max-width:380px;width:100%}
.game-result .time{font-size:48px;font-weight:700;font-family:'Space Mono',monospace;margin:12px 0}
.game-result .label{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.game-result .record-badge{display:inline-block;padding:4px 12px;border-radius:8px;background:#facc1520;color:#facc15;font-size:12px;font-weight:700;margin-top:8px}
.game-result-btns{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.game-result-btns button{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .15s}
.game-result-btns .save{background:linear-gradient(135deg,#22d3ee,#a78bfa);color:#fff;box-shadow:0 4px 16px #22d3ee30}
.game-result-btns .replay{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.game-result-btns .replay:hover{border-color:var(--border2)}
.game-result-btns .cancel{background:transparent;border:1px solid var(--border);color:var(--text2)}
.game-session{width:100%;max-width:420px}
.game-session h4{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.game-session .times{display:flex;gap:6px;flex-wrap:wrap}
.game-session .times span{padding:4px 10px;border-radius:7px;font-size:12px;font-family:'Space Mono',monospace;font-weight:600}
.game-count{font-size:11px;color:var(--text2);padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:default;align-self:flex-end;white-space:pre-line;position:relative}
.game-count:hover{color:var(--text);border-color:var(--border2)}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">
    <div class="big-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
    <h1>Schulte Tracker</h1>
    <p>Suivez votre progression aux tables de Schulte</p>
  </div>
  <button class="google-btn" onclick="googleLogin()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Se connecter avec Google
  </button>
  <div id="login-error" class="login-error"></div>
</div>

<!-- ═══ STICKY HEADER ═══ -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
      <div><h1>Schulte Tracker</h1><p id="hdr-sub"></p></div>

/* ═══ STREAK ═══ */
function calcStreak(){
  const dates=S.data.map(d=>d.date).sort().reverse();
  if(!dates.length)return 0;
  const today=ti();const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);const yd=yesterday.toISOString().slice(0,10);
  if(dates[0]!==today&&dates[0]!==yd)return 0;
  let streak=1;
  for(let i=0;i<dates.length-1;i++){
    const cur=new Date(dates[i]+"T12:00:00");const prev=new Date(dates[i+1]+"T12:00:00");
    const diff=(cur-prev)/(1000*60*60*24);
    if(diff===1)streak++;else break;
  }
  return streak;
}

/* ═══ GAME STATE ═══ */
let GM = {
  size: 3,        // current grid size
  board: [],      // shuffled numbers
  next: 1,        // next number to click
  total: 9,       // size*size
  state: 'idle',  // idle | playing | done
  startTime: 0,
  elapsed: 0,
  timerRAF: null,
  result: null,    // final time in seconds
  sessionTimes: [] // times saved this session
};

function shuffleArray(n) {
  const arr = Array.from({length: n}, (_, i) => i + 1);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function gameSetSize(n) {
  stopGameTimer();
  const wrap = document.querySelector('.game-board-wrap');
  if (wrap && GM.size !== n) {
    wrap.classList.add('switching');
    setTimeout(() => {
      GM.size = n; GM.total = n * n; GM.state = 'ready'; GM.result = null; GM.next = 1; GM.board = shuffleArray(GM.total); R();
    }, 200);
  } else {
    GM.size = n; GM.total = n * n; GM.state = 'ready'; GM.result = null; GM.next = 1; GM.board = shuffleArray(GM.total); R();
  }
}

function startGame() {
  stopGameTimer();
  GM.board = shuffleArray(GM.total);
  GM.next = 1;
  GM.state = 'ready';
  GM.result = null;
  GM.startTime = 0;
  GM.elapsed = 0;
  R();
}

function updateGameTimer() {
  if (GM.state !== 'playing') return;
  GM.elapsed = (performance.now() - GM.startTime) / 1000;
  const el = document.getElementById('game-timer');
  if (el) el.textContent = GM.elapsed.toFixed(2);
  GM.timerRAF = requestAnimationFrame(updateGameTimer);
}

function stopGameTimer() {
  if (GM.timerRAF) { cancelAnimationFrame(GM.timerRAF); GM.timerRAF = null; }
}

function gameClick(num) {
  if (GM.state !== 'playing' && GM.state !== 'ready') return;
  // Start timer on first correct click
  if (GM.state === 'ready' && num === GM.next) {
    GM.state = 'playing';
    GM.startTime = performance.now();
    updateGameTimer();
  }
  if (GM.state === 'ready') return; // wrong first click, ignore
  if (num === GM.next) {
    // Correct — cell stays EXACTLY the same visually
    sfxCorrect();vib(10);
    GM.next++;
    const nextEl = document.getElementById('game-next-num');
    if (nextEl) nextEl.textContent = GM.next <= GM.total ? GM.next : '✓';
    if (GM.next > GM.total) {
      stopGameTimer();
      GM.elapsed = (performance.now() - GM.startTime) / 1000;
      GM.result = +GM.elapsed.toFixed(2);
      GM.state = 'done';
      // Check for record
      const key = GM.size + 'x' + GM.size;
      const allVals = S.data.flatMap(d => d[key] || []);
      const pb = allVals.length ? Math.min(...allVals) : null;
      if (!pb || GM.result < pb) { sfxRecord(); setTimeout(launchConfetti, 100); }
      R();
    }
  } else {
    // Wrong — brief red flash, no blocking
    sfxWrong();vib([30,20,30]);
    const cellEl = document.getElementById('gc-' + num);
    if (cellEl) { cellEl.className = 'game-cell wrong'; setTimeout(() => { if (cellEl && cellEl.className === 'game-cell wrong') cellEl.className = 'game-cell idle'; }, 200); }
  }
}

function gameSaveResult() {
  if (!GM.result) return;
  const today = ti();
  const key = GM.size + 'x' + GM.size;
  // Auto-create grid in config if it doesn't exist
  if (!S.grids.some(g => g.key === key)) {
    const ci = S.grids.length % GC.length;
    S.grids.push({ key, label: GM.size + '×' + GM.size, defaultAttempts: 3, color: GC[ci] });
  }
  // Find or create today's entry
  let entry = S.data.find(d => d.date === today);
  if (!entry) {
    entry = { date: today };
    S.grids.forEach(g => { entry[g.key] = []; });
    S.data.push(entry);
    S.data.sort((a, b) => a.date.localeCompare(b.date));
  }
  if (!entry[key]) entry[key] = [];
  entry[key].push(GM.result);
  GM.sessionTimes.push({ key, time: GM.result });
  ps();
  checkBadges();
  startGame();
}

function gameDiscard() {
  startGame();
}

        <div class="label">Terminé — ${n}×${n}</div>
        <div class="time" style="color:${gc}">${GM.result}<span style="font-size:20px;color:var(--text2)">s</span></div>
        ${isRecord ? '<div class="record-badge">🏆 Nouveau record !</div>' : personalBest ? `<div style="font-size:12px;color:var(--text2);margin-top:4px">Record : ${personalBest.toFixed(2)}s</div>` : ''}
        <div class="game-result-btns">
          <button class="save" onclick="gameSaveResult()">💾 Enregistrer & Rejouer</button>
          <button class="cancel" onclick="gameDiscard()">✗ Annuler & Rejouer</button>
        </div>
      </div>
      ${renderGameSession(gc)}
    </div>`;
  }

  // Status text
  const statusHTML = GM.state === 'ready'
    ? `<div style="text-align:center;font-size:13px;color:var(--text2)">Cliquez sur <span style="color:#22d3ee;font-weight:700">1</span> pour commencer</div>`
    : GM.state === 'playing'
    ? `<div style="text-align:center;font-size:13px;color:#34d399;font-weight:600">En cours...</div>`
    : '';

  // Board with inline chrono bar — fixed grid size, cells scale to fit
  const boardMax = 420;
  const fontSize = n <= 4 ? 'clamp(20px,5.5vw,30px)' : n <= 6 ? 'clamp(14px,4vw,22px)' : n <= 8 ? 'clamp(12px,3vw,17px)' : 'clamp(10px,2.2vw,14px)';
  let board = `<div style="width:min(90vw,${boardMax}px)">`;
  // Chrono bar above the grid
  board += `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:0 2px 6px;font-family:'Space Mono',monospace">`;
  board += `<span style="font-size:13px;color:var(--text2)">Next: <span id="game-next-num" style="color:#22d3ee;font-weight:700">${GM.state==='ready'?1:GM.next<=GM.total?GM.next:'✓'}</span></span>`;
  board += `<span id="game-timer" style="font-size:13px;color:var(--text2);font-weight:600">${GM.state==='playing'?'0.00':'0.00'}</span>`;
  board += `</div>`;
  board += `<div class="game-board" style="grid-template-columns:repeat(${n},1fr);gap:0;">`;
  GM.board.forEach(num => {
    board += `<div id="gc-${num}" class="game-cell idle" onclick="gameClick(${num})" style="aspect-ratio:1;font-size:${fontSize}">${num}</div>`;
  });
  board += '</div></div>';

  // Restart button (replaces start button)
  const restartBtn = `<button onclick="startGame()" style="margin-top:4px;padding:8px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s">↻ Restart</button>`;

  const pbText = personalBest ? `<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:-8px">Record ${n}×${n} : <span style="color:${gc};font-weight:700">${personalBest.toFixed(2)}s</span></div>` : '';

  return `<div class="game-wrap">${gameCountHTML}${sel}<div class="game-board-wrap">${statusHTML}${pbText}${board}${restartBtn}</div>${renderGameSession(gc)}</div>`;
}

function renderGameSession(gc) {
  const todayTimes = GM.sessionTimes.filter(t => true); // all saved this session
  if (!todayTimes.length) return '';
  let h = '<div class="game-session"><h4>🎯 Essais sauvegardés cette session</h4><div class="times">';
  todayTimes.forEach(t => {
    const gr = S.grids.find(g => g.key === t.key);
    const c = gr ? gr.color : '#22d3ee';
    h += `<span style="background:${c}18;color:${c}">${gr?gr.label:t.key} ${t.time}s</span>`;
  });
  h += '</div></div>';
  return h;
}

function sv(v){stopGameTimer();if(S.view==='entry'&&v!=='entry'){clearTimeout(_autoSaveTimer);seQuiet()}S.view=v;if(v==='entry')lev();if(v==='play'){GM.state='ready';GM.board=shuffleArray(GM.total);GM.next=1;GM.result=null;}R()}

function ue(gk,i,v){if(!S.ev[gk])S.ev[gk]=[];S.ev[gk][i]=v;autoSave()}

function seQuiet(){

}
function aa(gk){if(!S.ev[gk])S.ev[gk]=[];S.ev[gk].push("");R();autoSave()}
function ra(gk){if(!S.ev[gk]||S.ev[gk].length<=1)return;S.ev[gk].pop();R();autoSave()}
function se(){const ne={date:S.ed};let ha=false;S.grids.forEach(g=>{const v=(S.ev[g.key]||[]).map(x=>parseFloat(String(x).replace(",","."))).filter(x=>!isNaN(x)&&x>0);ne[g.key]=v;if(v.length)ha=true});if(!ha)return;S.data=S.data.filter(d=>d.date!==S.ed);S.data.push(ne);S.data.sort((a,b)=>a.date.localeCompare(b.date));ps();R();const el=document.getElementById("ss");if(el){el.textContent="✓ Sauvegardé !";el.style.color="#34d399";setTimeout(()=>{if(el)el.textContent=""},2000)}}
function de(d){S.data=S.data.filter(x=>x.date!==d);ps();S.cd=null;lev();R()}
function rg(k){S.grids=S.grids.filter(g=>g.key!==k);S.data=S.data.map(d=>{const n={...d};delete n[k];return n});ps();S.cdg=null;if(S.sf===k)S.sf="all";R()}
function ua(k,v){const n=parseInt(v);if(isNaN(n)||n<1||n>20)return;S.grids=S.grids.map(g=>g.key===k?{...g,defaultAttempts:n}:g);ps()}
function ag(){const s=parseInt(S.ngs);if(isNaN(s)||s<2||s>12)return;const k=`${s}x${s}`;if(S.grids.some(g=>g.key===k))return;S.grids.push({key:k,label:`${s}×${s}`,defaultAttempts:parseInt(S.nga)||3,color:GC[S.grids.length%GC.length]});S.data=S.data.map(d=>({...d,[k]:d[k]||[]}));ps();S.ngs="";S.nga="3";S.sag=false;R()}
function ra2(){S.data=JSON.parse(JSON.stringify(ID));S.grids=JSON.parse(JSON.stringify(DG));ps();S.cr=0;S.sf="all";lev();R()}

/* ═══ SOUND & VIBRATION ═══ */
const _actx = new (window.AudioContext || window.webkitAudioContext)();
function sfxCorrect(){
  const o=_actx.createOscillator(),g=_actx.createGain();
  o.connect(g);g.connect(_actx.destination);
  o.type='sine';o.frequency.setValueAtTime(880,_actx.currentTime);
  g.gain.setValueAtTime(0.08,_actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+0.08);
  o.start();o.stop(_actx.currentTime+0.08);
}
function sfxWrong(){
  const o=_actx.createOscillator(),g=_actx.createGain();
  o.connect(g);g.connect(_actx.destination);
  o.type='square';o.frequency.setValueAtTime(220,_actx.currentTime);
  g.gain.setValueAtTime(0.06,_actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+0.15);
  o.start();o.stop(_actx.currentTime+0.15);
}
function sfxRecord(){
  [0,100,200].forEach((delay,i)=>{
    setTimeout(()=>{
      const o=_actx.createOscillator(),g=_actx.createGain();
      o.connect(g);g.connect(_actx.destination);
      o.type='sine';o.frequency.setValueAtTime([523,659,784][i],_actx.currentTime);
      g.gain.setValueAtTime(0.1,_actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+0.2);
      o.start();o.stop(_actx.currentTime+0.2);
    },delay);
  });
}

/* ═══ CONFETTI ═══ */
function launchConfetti(){
  let canvas=document.getElementById('confetti-canvas');
  if(!canvas){canvas=document.createElement('canvas');canvas.id='confetti-canvas';document.body.appendChild(canvas)}
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];const colors=['#22d3ee','#a78bfa','#fb923c','#f472b6','#4ade80','#facc15'];
  for(let i=0;i<80;i++){
    pieces.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,
      r:Math.random()*6+3,c:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-0.5)*8,a:1});
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      p.x+=p.vx;p.vy+=0.3;p.y+=p.vy;p.rot+=p.rv;
      if(frame>40)p.a=Math.max(0,p.a-0.02);
      if(p.a>0)alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
    });
    frame++;
    if(alive&&frame<120)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.remove()}
  }
  requestAnimationFrame(draw);
}

if(!S.earnedBadges)S.earnedBadges=[];

function checkBadges(){
  let newBadge=null;
  BADGES.forEach(b=>{
    if(!S.earnedBadges.includes(b.id)&&b.check(S.data)){
      S.earnedBadges.push(b.id);newBadge=b;
    }
  });
  if(newBadge)showBadgeToast(newBadge);
}
function showBadgeToast(b){
  const el=document.createElement('div');el.className='badge-toast';
  el.innerHTML=`<span style="font-size:20px">${b.icon}</span><span>${b.name} — ${b.desc}</span>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function renderBadges(){
  let h='<div class="badges-grid">';
  BADGES.forEach(b=>{
    const earned=S.earnedBadges.includes(b.id);
    h+=`<div class="badge-item ${earned?'earned':'locked'}" title="${b.desc}"><span style="font-size:16px">${b.icon}</span>${b.name}</div>`;
  });
  return h+'</div>';
}
